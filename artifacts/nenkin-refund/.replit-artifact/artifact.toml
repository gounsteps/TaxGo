kind = "web"
previewPath = "/"
title = "日本年金 탈퇴일시금 대행신청"
version = "1.0.0"
id = "artifacts/nenkin-refund"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25989

[services.development]
run = "pnpm --filter @workspace/nenkin-refund run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nenkin-refund", "run", "build" ]
publicDir = "artifacts/nenkin-refund/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25989"
BASE_PATH = "/"
