    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"탈퇴일시금은 무엇인가요? 그리고 누가 신청가능한가요?","acceptedAnswer":{"@type":"Answer","text":"<p>일본에서 일하며 연금 보험료를 냈던 외국인이 연금을 받지 않고 고국으로 돌아갈 때, <strong>그동안 냈던 돈의 일부를 환급해 주는 제도</strong>입니다.</p><p class='mt-3 font-semibold text-slate-800'>누가 받을 수 있나요?</p><p class='mt-1'>다음 조건에 모두 해당한다면 신청할 수 있습니다.</p><ol class='mt-2 space-y-1 list-decimal list-inside'><li><strong>외국인일 것:</strong> 일본 국적이 아니어야 합니다.</li><li><strong>6개월 이상 납부:</strong> 연금 보험료를 낸 기간이 총 6개월을 넘어야 합니다.</li><li>10년 미만 납부: 연금 보험료를 낸 기간이 총 10년 미만이어야 합니다.</li><li><strong>일본을 떠난 상태:</strong> 일본에 주소가 없어야 합니다. (전출 신고 후 출국 필수)</li><li><strong>연금 수령 이력 없음:</strong> 이전에 연금(장애 연금 포함)을 한 번도 받은 적이 없어야 합니다.</li></ol><p class='mt-3 text-sm text-slate-500'>※ 영주권자의 경우에는 상이한 기준이 적용됩니다.</p>"}},{"@type":"Question","name":"탈퇴일시금 신청, 본인이 직접 할 수 있나요?","acceptedAnswer":{"@type":"Answer","text":"<p>네, 서류 접수는 직접 가능합니다. 하지만 '세금 환급' 때문에 대행 서비스를 권장합니다.</p><p class='mt-3'>탈퇴일시금 신청 과정은 크게 두 단계로 나뉩니다. 본인이 직접 진행할 때 놓치기 쉬운 '세금 환급' 부분을 꼭 확인하세요.</p><div class='mt-3'><p class='font-semibold text-slate-800'>1단계: 탈퇴일시금 청구 (본인 가능)</p><p class='mt-1'>본인이 직접 서류를 준비해 일본 연금기구에 우편으로 접수할 수 있습니다. 이 경우 납부한 연금의 약 80%를 수령하게 됩니다.</p></div><div class='mt-3'><p class='font-semibold text-slate-800'>2단계: 소득세 환급 (납세관리인 필수)</p><p class='mt-1'>후생연금의 경우, 국가에서 지급액의 약 20%를 소득세로 원천징수한 뒤 나머지만 지급합니다. 이 떼인 세금을 돌려받으려면 반드시 일본에 거주하는 '납세관리인'을 선임하여 현지 세무서에 따로 신고해야 합니다.</p></div><div class='mt-4 p-3 bg-slate-50 rounded-lg border border-slate-200'><p class='font-semibold text-slate-800'>결론적으로,</p><p class='mt-1'>해외에 계신 신청자가 직접 일본 세무서에 환급을 청구하는 것은 현실적으로 어렵습니다. 따라서 탈퇴일시금 100% 전액 수령(연금 청구 + 세금 환급)을 위해 많은 분이 전문 대행 서비스를 이용하고 계십니다.</p></div>"}},{"@type":"Question","name":"언제까지 신청해야 하나요?","acceptedAnswer":{"@type":"Answer","text":"탈퇴일시금은 일본을 떠나 더 이상 일본에 주소가 없게 된 날(전출신고일)로부터 2년 이내에 청구해야 합니다. 탈퇴일시금은 마지막으로 공적 연금 제도의 피보험자 자격을 상실한 날로부터 2년 이내에만 청구할 수 있습니다. 단, 자격을 상실한 날에 일본 국내에 주소가 있는 경우에는 그 후 일본 국내에 주소를 두지 않게 된 날로부터 2년 이내에만 청구할 수 있습니다."}},{"@type":"Question","name":"얼마나 받을 수 있나요?","acceptedAnswer":{"@type":"Answer","text":"지급액은 가입했던 연금의 종류와 보험료 납부 기간에 따라 달라집니다. 국민연금은 마지막으로 보험료를 낸 달의 연도에 따라 정해진 금액에 가입 기간별 지급률을 곱하여 계산합니다. 후생연금은 가입 기간 중의 평균 표준보수액과 보험료율, 가입 기간(최대 60개월 상한) 등을 고려하여 산출합니다. 홈페이지 계산기를 이용하시면 예상 금액을 확인하실 수 있습니다."}},{"@type":"Question","name":"신청 후 돈을 받기까지 얼마나 걸리나요?","acceptedAnswer":{"@type":"Answer","text":"제출하신 서류에 미비점이나 확인사항이 없다면, 청구서 접수 후 약 4개월 후에 지급됩니다. 탈퇴일시금의 송금과 동시에 '탈퇴일시금 지급결정 통지서'를 발송합니다. 서류에 미비점이 있는 경우 지급까지 추가 시간이 소요될 수 있으므로 서류를 꼼꼼히 확인하여 제출하는 것이 중요합니다."}},{"@type":"Question","name":"탈퇴일시금은 직접 진행하고 세무서에 환급금만 대행신청할 수 있나요?","acceptedAnswer":{"@type":"Answer","text":"네, 가능합니다. 탈퇴일시금을 직접 진행하시고 탈퇴일시금 지급결정통지서를 수령하셨다면 신청하실 수 있습니다. 환급신청폼을 통해 원천징수세 환부금 코스를 선택해 주세요."}},{"@type":"Question","name":"탈퇴일시금 지급결정통지서를 분실하였습니다. 재발행 가능한가요?","acceptedAnswer":{"@type":"Answer","text":"네, 가능합니다. 환급신청폼을 통해 원천징수세 환부금 코스를 선택하여 대행신청을 진행해 주시고, 탈퇴일시금 지급결정통지서 재발급이 필요하다는 내용을 담당자에게 전달해 주세요."}},{"@type":"Question","name":"탈퇴일시금 신청의 진행상황을 알고 싶어요.","acceptedAnswer":{"@type":"Answer","text":"일본연금기구에서는 탈퇴일시금 신청 진행상황에 대해서 공개하고 있지 않습니다. 저희 TaxGo에서는 X를 통해, 현재 대행 진행 중인 탈퇴일시금의 처리 완료일을 안내드리고 있습니다. 참고하여 주세요."}},{"@type":"Question","name":"TaxGo의 탈퇴일시금 대행 실적이 어느 정도인가요?","acceptedAnswer":{"@type":"Answer","text":"네이버 블로그에서 고객 후기를 참고해 주세요. <a href='https://blog.naver.com/nouzeidaikou/222590067078' target='_blank' rel='noopener noreferrer' class='text-primary underline hover:text-primary/80'>고객 후기 보러가기</a>"}}]}</script>
