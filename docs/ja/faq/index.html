    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"脱退一時金とは何ですか？また、誰が申請できますか？","acceptedAnswer":{"@type":"Answer","text":"日本で働きながら年金保険料を納めていた外国人が、年金を受け取らず帰国する際に、 これまで納めたお金の一部を還付してもらえる制度 です。 誰が受け取れますか？ 以下の条件をすべて満たす方が申請できます。 外国人であること： 日本国籍を有していないこと。 6ヶ月以上納付： 年金保険料の納付期間が合計6ヶ月を超えていること。 10年未満の納付：年金保険料の納付期間が合計10年未満であること。 日本を離れていること： 日本国内に住所がないこと。（転出届の提出後に出国必須） 年金受給歴なし： 以前に年金（障害年金を含む）を一度も受け取ったことがないこと。 ※ 永住者の場合は、異なる基準が適用されます。"}},{"@type":"Question","name":"脱退一時金の申請は本人が直接できますか？","acceptedAnswer":{"@type":"Answer","text":"はい、書類の受付は直接行うことができます。ただし、「税金の還付」のため、代行サービスをお勧めしています。 脱退一時金の申請プロセスは、大きく2つのステップに分かれます。ご自身で手続きする際に見落としがちな「税金の還付」部分を必ずご確認ください。 ステップ1：脱退一時金の請求（本人可能） ご自身で書類を準備し、日本年金機構に郵送で受付することができます。この場合、納付した年金の約80%を受け取ることになります。 ステップ2：所得税の還付（納税管理人が必要） 厚生年金の場合、国から支給額の約20%が所得税として源泉徴収されてから残りが支払われます。この差し引かれた税金を取り戻すには、必ず日本に住む「納税管理人」を選任し、現地の税務署に別途申告する必要があります。 結論として、 海外にお住まいの申請者が直接日本の税務署に還付を請求することは現実的に困難です。そのため、脱退一時金の100%全額受領（年金請求＋税金還付）のために、多くの方が専門の代行サービスをご利用されています。"}},{"@type":"Question","name":"いつまでに申請しなければなりませんか？","acceptedAnswer":{"@type":"Answer","text":"脱退一時金は、日本を離れて日本国内に住所がなくなった日（転出届提出日）から2年以内に請求する必要があります。脱退一時金は、最後に公的年金制度の被保険者資格を喪失した日から2年以内に限り請求することができます。ただし、資格喪失した日に日本国内に住所がある場合は、その後、住所を日本国内に有しなくなった日から2年以内に限り請求することができます。"}},{"@type":"Question","name":"いくら受け取れますか？","acceptedAnswer":{"@type":"Answer","text":"支給額は加入していた年金の種類と保険料の納付期間によって異なります。国民年金は、最後に保険料を納めた月の年度に応じて定められた額に加入期間別の支給率を掛けて計算します。厚生年金は、加入期間中の平均標準報酬額と保険料率、加入期間（最大60ヶ月上限）などを考慮して算出します。ホームページの計算機でおおよその金額をご確認いただけます。"}},{"@type":"Question","name":"申請後、お金を受け取るまでどのくらいかかりますか？","acceptedAnswer":{"@type":"Answer","text":"提出いただいた書類に不備や確認事項がなければ、請求書の受付後およそ4ヶ月後にお支払いします。脱退一時金の送金と同時に「脱退一時金支給決定通知書」を送付します。書類に不備がある場合は支払いまでに追加の時間がかかりますので、書類を丁寧にご確認の上ご提出ください。"}},{"@type":"Question","name":"脱退一時金は自分で手続きして、税務署への還付金のみ代行申請できますか？","acceptedAnswer":{"@type":"Answer","text":"はい、可能です。脱退一時金をご自身で手続きされ、脱退一時金支給決定通知書を受け取られた場合に申請できます。還付申請フォームにて源泉徴収税還付コースをお選びください。"}},{"@type":"Question","name":"脱退一時金支給決定通知書を紛失しました。再発行は可能ですか？","acceptedAnswer":{"@type":"Answer","text":"はい、可能です。還付申請フォームにて源泉徴収税還付コースを選択して代行申請を進め、脱退一時金支給決定通知書の再発行が必要である旨を担当者にお伝えください。"}},{"@type":"Question","name":"脱退一時金申請の進捗状況を知りたいです。","acceptedAnswer":{"@type":"Answer","text":"日本年金機構では、脱退一時金申請の進捗状況について公開していません。TaxGoでは、Xを通じて現在代行中の脱退一時金の処理完了日をお知らせしています。ぜひご参照ください。"}},{"@type":"Question","name":"TaxGoの脱退一時金代行実績はどのくらいですか？","acceptedAnswer":{"@type":"Answer","text":"ネイバーブログでお客様の口コミをご確認ください。 口コミを見る（韓国語）"}}]}</script>
